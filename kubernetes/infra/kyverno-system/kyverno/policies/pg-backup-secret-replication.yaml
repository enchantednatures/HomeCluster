---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/v1/clusterpolicy.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: replicate-pg-backup-secret
  annotations:
    policies.kyverno.io/title: Replicate PostgreSQL Backup Secret
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    kyverno.io/kyverno-version: 1.9.0
    policies.kyverno.io/minversion: 1.6.0
    kyverno.io/kubernetes-version: "1.24"
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      This policy replicates the pg-backup-secret from the postgres namespace
      to all newly created namespaces, providing S3 credentials for CloudNative-PG
      barman backups to MinIO without per-namespace secret management.
spec:
  background: true
  rules:
    - name: generate-pg-backup-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno-system
                - flux-system
                - istio-system
                - rook-ceph
                - openebs-system
                - monitoring
                - knative-*
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: pg-backup-secret
        namespace: "{{request.object.metadata.name}}"
        clone:
          namespace: postgres
          name: pg-backup-secret
