---
# Node configuration for melusine baremetal node
# This file contains node-specific labels and taints for GitOps management
apiVersion: v1
kind: Node
metadata:
  name: melusine
  labels:
    # Medik8s baremetal label for IPMI fencing
    medik8s.io/baremetal: "true"
    # Node type labels
    topology.kubernetes.io/zone: external
    node.kubernetes.io/instance-type: external
    # Kubevirt scheduling (disabled when node is not ready)
    kubevirt.io/schedulable: "false"
  annotations:
    # IPMI configuration reference
    medik8s.io/ipmi-secret: melusine-ipmi-credentials
    medik8s.io/ipmi-address: "192.168.1.232"
    # Node description
    node-description: "Baremetal worker node with IPMI fencing capability"
spec:
  # Taints applied by Medik8s during remediation
  taints:
    - effect: NoSchedule
      key: node.kubernetes.io/unreachable
      timeAdded: "2026-04-06T16:21:45Z"
    - effect: NoExecute
      key: node.kubernetes.io/unreachable
      timeAdded: "2026-04-06T16:21:45Z"
