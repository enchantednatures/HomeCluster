---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kellnr-db
  namespace: kellnr
  labels:
    app.kubernetes.io/name: kellnr-db
spec:
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql versioning=redhat
  imageName: ghcr.io/cloudnative-pg/postgresql:17.1-1
  instances: 3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClass: csi-nfs
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  enableSuperuserAccess: true
  superuserSecret:
    name: kellnr-postgres-superuser
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: 256MB
  monitoring:
    enablePodMonitor: true
  managed:
    roles:
      - name: hunter
        ensure: present
        comment: Hunter
        login: true
        superuser: true
        passwordSecret:
          name: kellnr-db-hunter
        inRoles: [pg_monitor, pg_signal_backend]
      - name: kellnr
        ensure: present
        comment: Kellnr
        login: true
        superuser: false
        passwordSecret:
          name: kellnr-db-user
        inRoles: [pg_monitor, pg_signal_backend]
      - name: cnpg_pooler_pgbouncer
        ensure: present
        comment: PgBouncer auth user
        login: true
        superuser: false
        inRoles: [pg_monitor]
  bootstrap:
    initdb:
      database: app
      owner: kellnr
      secret:
        name: kellnr-db-user
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-store
        serverName: kellnr-v1
