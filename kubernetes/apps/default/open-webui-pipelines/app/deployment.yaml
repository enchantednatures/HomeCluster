apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines
  labels:
    app: pipelines
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipelines
  template:
    metadata:
      labels:
        app: pipelines
    spec:
      containers:
        - name: pipelines
          image: ghcr.io/open-webui/pipelines:main@sha256:b48e9bc338ce2be0acfbeff01810db72408a12f07739f9e3879c1f2b00952d6e # {"$imagepolicy": "flux-system:open-webui-pipelines-main"}
          ports:
            - containerPort: 9099
          volumeMounts:
            - name: pipelines-storage
              mountPath: /app/pipelines
      volumes:
        - name: pipelines-storage
          persistentVolumeClaim:
            claimName: pipelines-pvc
