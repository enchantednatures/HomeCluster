apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app: open-webui
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 200%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main@sha256:ffb0275d5c626c8b0713d1c0f002f359ea36c80b5cd584370b116b0563ed849e # {"$imagepolicy": "flux-system:open-webui-main"}
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: open-webui-secret
            - configMapRef:
                name: open-webui-config
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
          volumeMounts:
            - mountPath: /app/backend/data
              name: open-webui-data
          ports:
            - containerPort: 8080
              name: open-webui
      restartPolicy: Always
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
